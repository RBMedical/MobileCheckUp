<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <title>Mobile Check Up Registration</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"><i data-lucide="cross"></i></div>
        <div>
          <strong>Check Up</strong>
          <span>Mobile</span>
          <small>โรงพยาบาล</small>
        </div>
      </div>

      <nav class="menu">
        <button class="menu-item active" data-page="registration"><i data-lucide="clipboard-plus"></i><span>ลงทะเบียน</span></button>
        <button class="menu-item" data-page="specimen"><i data-lucide="test-tube-2"></i><span>นับสิ่งตรวจ</span></button>
        <button class="menu-item" data-page="report"><i data-lucide="chart-no-axes-combined"></i><span>รายงาน/ติดตาม</span></button>
      </nav>

      <div class="sidebar-art">
        <i data-lucide="activity"></i>
        <i data-lucide="hospital"></i>
      </div>
    </aside>

    <main class="app-shell">
      <header class="page-header">
        <div>
          <h1>ลงทะเบียน</h1>
          <p>งาน Check Up Mobile</p>
        </div>
        <div class="status-pill" id="connectionStatus">พร้อมใช้งาน</div>
      </header>

      <section class="workspace page active" id="registrationPage">
        <section class="register-panel">
          <div class="search-row">
            <label class="search-label"><i data-lucide="search"></i>ค้นหา</label>
            <input id="searchInput" type="search" placeholder="ค้นหาได้ทั้ง รหัสประจำตัว, ชื่อ นามสกุล, เลขบัตรประชาชน" />
            <button class="primary" id="searchBtn"><i data-lucide="search"></i>ค้นหา</button>
          </div>

          <div class="result-list" id="resultList"></div>

          <form class="data-form" id="employeeForm">
            <input type="hidden" id="rowId" />
            <div class="field"><label>HN</label><input id="HN" name="HN" placeholder="-" /></div>
            <div class="field"><label>ชื่อ นามสกุล</label><input id="ชื่อ นามสกุล" name="ชื่อ นามสกุล" placeholder="-" /></div>
            <div class="field"><label>รหัสประจำตัว</label><input id="รหัสประจำตัว" name="รหัสประจำตัว" placeholder="-" /></div>
            <div class="field"><label>เลขบัตรประชาชน</label><input id="เลขบัตรประชาชน" name="เลขบัตรประชาชน" placeholder="-" /></div>
            <div class="field"><label>แผนก</label><input id="แผนก" name="แผนก" placeholder="-" /></div>
            <div class="field"><label>ตำแหน่ง</label><input id="ตำแหน่ง" name="ตำแหน่ง" placeholder="-" /></div>
            <div class="field"><label>ชั้นปี</label><input id="ชั้นปี" name="ชั้นปี" placeholder="-" /></div>
            <div class="field"><label>สาขา</label><input id="สาขา" name="สาขา" placeholder="-" /></div>
            <div class="field"><label>ห้อง</label><input id="ห้อง" name="ห้อง" placeholder="-" /></div>
            <div class="field"><label>โปรแกรม</label><input id="โปรแกรม" name="โปรแกรม" placeholder="-" /></div>
            <div class="field"><label>Customer</label><input id="Customer" name="Customer" placeholder="-" /></div>
            <div class="field"><label>ลำดับลงทะเบียน</label><input id="ลำดับลงทะเบียน" name="ลำดับลงทะเบียน" placeholder="-" readonly /></div>
            <div class="field"><label>วันที่ลงทะเบียน</label><input id="วันที่ลงทะเบียน" name="วันที่ลงทะเบียน" placeholder="-" readonly /></div>
            <div class="field"><label>เวลาลงทะเบียน</label><input id="เวลาลงทะเบียน" name="เวลาลงทะเบียน" placeholder="-" readonly /></div>
          </form>

          <div class="action-bar">
            <button class="edit" id="editBtn"><i data-lucide="pencil"></i>แก้ไข</button>
            <button class="danger" id="deleteBtn"><i data-lucide="trash-2"></i>ลบ</button>
            <button class="success" id="registerBtn"><i data-lucide="user-check"></i>ลงทะเบียน</button>
          </div>
        </section>

        <aside class="sticker-panel">
          <h2>สติกเกอร์บาร์โค้ด</h2>
          <div class="sticker-preview" id="stickerPreview">
            <div class="empty-state">
              <i data-lucide="barcode"></i>
              <p>พื้นที่แสดงสติกเกอร์บาร์โค้ด</p>
            </div>
          </div>
          <div class="printer-box">
            <label>เครื่องพิมพ์</label>
            <select id="printerSelect">
              <option>กรุณาเลือกเครื่องพิมพ์</option>
              <option>Sticker Printer 1</option>
              <option>Sticker Printer 2</option>
            </select>
            <button class="success full" id="printBtn"><i data-lucide="printer"></i>พิมพ์</button>
            <small>กรุณาตรวจสอบข้อมูลก่อนพิมพ์</small>
          </div>
        </aside>
      </section>

      <section class="placeholder-page page" id="specimenPage">
        <h2>นับสิ่งตรวจ</h2>
        <p>เตรียมพื้นที่สำหรับฟีเจอร์ถัดไป</p>
      </section>

      <section class="placeholder-page page" id="reportPage">
        <h2>รายงาน/ติดตาม</h2>
        <p>เตรียมพื้นที่สำหรับฟีเจอร์ถัดไป</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
